services:
  - type: web
    name: email-tracker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY
        generateValue: true
      - key: RETENTION_DAYS
        value: 7
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
